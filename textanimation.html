    <style>
        /* accueil */
.accueil {
    margin: auto;
    height: 650px;
    overflow: hidden;

    margin-top: 70px;
    margin-right: 1px;
}

.ac {
    animation: slides 16s infinite;
    height: 100%;
    width: 500%;
    display: flex;


}

/* texte accueil */
.textaccueil {
    font-size: 40px;
    margin-top: 40px;
}

@keyframes slides {
    0% {
        transform: translateX(0);
    }

    20% {
        transform: translateX(0);
    }

    25% {
        transform: translateX(-20%);
    }

    45% {
        transform: translateX(-20%);
    }

    50% {
        transform: translateX(-40%);
    }

    70% {
        transform: translateX(-40%);
    }

    75% {
        transform: translateX(-60%);
    }

    95% {
        transform: translateX(-60%);
    }

    100% {
        transform: translateX(-80%);
    }
}

.A0 {

    height: 100%;

    background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('STEPPER-TON.jpeg');
    /* L'image remplit tout l'espace proprement */
    background-position: center;
    /* L'image reste centrée */
    background-repeat: no-repeat;
    background-size: cover;
    width: 100%;



}
